<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO CODE GENERATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <i class="fa-solid fa-cube"></i>
    </div>
    <span class="brand-mark">PCG</span>
    <nav>
      <a class="active" title="Dashboard"><i class="fa-solid fa-house"></i></a>
      <a class="nav-reports" title="Reports"><i class="fa-solid fa-file-lines"></i></a>
      <a class="nav-analytics" title="Analytics"><i class="fa-solid fa-chart-simple"></i></a>
      <span class="nav-spacer"></span>
      <a title="Settings"><i class="fa-solid fa-gear"></i></a>
    </nav>
  </aside>

  <main>

    <div class="topbar">
      <div>
        <span class="eyebrow">Inventory command center</span>
        <h1>PRO CODE GENERATOR</h1>
        <p>Smart Product Code Management</p>
      </div>
      <div class="actions">
        <button class="cancel" type="button" title="Cancel" aria-label="Cancel">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <button class="save" type="button" title="Save Product" aria-label="Save Product">
          <i class="fa-solid fa-floppy-disk"></i>
        </button>
      </div>
    </div>

    <div class="cards">

      <div class="card purple">
        <div class="card-head">
          <i class="fa-solid fa-star"></i>
          <span>Leather</span>
        </div>
        <h2 id="leather-count"><span class="loader"></span></h2>
        <p>Total items tracked</p>
        <div class="progress" id="leather-progress">--</div>
      </div>

      <div class="card blue">
        <div class="card-head">
          <i class="fa-regular fa-square"></i>
          <span>Non-Leather</span>
        </div>
        <h2 id="non-leather-count"><span class="loader"></span></h2>
        <p>Total items tracked</p>
        <div class="progress" id="non-leather-progress">--</div>
      </div>

      <div class="card orange">
        <div class="card-head">
          <i class="fa-solid fa-box-open"></i>
          <span>Packing</span>
        </div>
        <h2 id="packing-count"><span class="loader"></span></h2>
        <p>Total items tracked</p>
        <div class="progress" id="packing-progress">--</div>
      </div>

    </div>

    <div class="content">

      <section class="form-panel">
        <div class="panel-head">
          <div>
            <span class="eyebrow">Create code</span>
            <h2>Product Information</h2>
          </div>
          <i class="fa-solid fa-barcode"></i>
        </div>

        <div class="grid create-code-grid">

          <label>
            Group
            <div class="custom-select" data-id="group" data-placeholder="Select Group">
              <button class="cs-trigger" type="button">
                <span class="cs-value cs-placeholder">Select Group</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            Category
            <div class="custom-select" data-id="category" data-placeholder="Select Category">
              <button class="cs-trigger" type="button" disabled>
                <span class="cs-value cs-placeholder">Select Category</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            Sub-Category
            <div class="custom-select" data-id="subCategory" data-placeholder="Select Sub-Category">
              <button class="cs-trigger" type="button" disabled>
                <span class="cs-value cs-placeholder">Select Sub-Category</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            Number
            <div class="custom-select" data-id="number" data-placeholder="Select Number">
              <button class="cs-trigger" type="button">
                <span class="cs-value cs-placeholder">Select Number</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            UOM
            <div class="custom-select" data-id="uom" data-placeholder="Select UOM">
              <button class="cs-trigger" type="button">
                <span class="cs-value cs-placeholder">Select UOM</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            Description
            <div class="custom-select" data-id="description" data-placeholder="Select Description">
              <button class="cs-trigger" type="button">
                <span class="cs-value cs-placeholder">Select Description</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            Description (Opt.)
            <div class="custom-select" data-id="descriptionOpt" data-placeholder="Select Description (Opt.)">
              <button class="cs-trigger" type="button">
                <span class="cs-value cs-placeholder">Select Description (Opt.)</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            Colour
            <div class="custom-select" data-id="colour" data-placeholder="Select Colour">
              <button class="cs-trigger" type="button">
                <span class="cs-value cs-placeholder">Select Colour</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            Stock Keeping UOM
            <div class="custom-select" data-id="stockKeepingUom" data-placeholder="Select Stock Keeping UOM">
              <button class="cs-trigger" type="button">
                <span class="cs-value cs-placeholder">Select Stock Keeping UOM</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            Alt. UOM
            <div class="custom-select" data-id="altUom" data-placeholder="Select Alt. UOM">
              <button class="cs-trigger" type="button">
                <span class="cs-value cs-placeholder">Select Alt. UOM</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

          <label>
            Unit Conversion Rate
            <div class="custom-select" data-id="conversionRate" data-placeholder="Select Rate">
              <button class="cs-trigger" type="button">
                <span class="cs-value cs-placeholder">Select Rate</span>
                <i class="fa-solid fa-chevron-down cs-chevron"></i>
              </button>
              <div class="cs-panel">
                <div class="cs-search-wrap">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input class="cs-search" type="text" placeholder="Search...">
                </div>
                <ul class="cs-list"></ul>
              </div>
            </div>
          </label>

        </div>

        <div class="code-box">
          <span>Generated Product Code</span>
          <strong id="generated-code">Waiting for input</strong>
        </div>
      </section>

      <aside class="ai-panel">

        <div class="aip-orb aip-orb-1"></div>
        <div class="aip-orb aip-orb-2"></div>

        <div class="aip-header">
          <div class="aip-avatar">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span class="aip-avatar-ring"></span>
          </div>
          <div>
            <h3 class="aip-name">AI Assistant</h3>
            <div class="aip-status">
              <span class="aip-dot"></span>
              <span>Online &amp; Ready</span>
            </div>
          </div>
        </div>


      </aside>

    </div>

  </main>

</div>

<script src="js/app.js"></script>
</body>
</html>
